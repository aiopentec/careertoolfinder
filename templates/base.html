<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Compare the best job search tools — resume builders, ATS scanners, interview prep, job boards, and LinkedIn tools.{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ site_url }}/{% endblock %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">{{ site_name }}</a>
    <nav>
      <a href="/category/resume.html">Resume</a>
      <a href="/category/interview.html">Interview</a>
      <a href="/category/jobboard.html">Job Boards</a>
      <a href="/category/linkedin.html">LinkedIn</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p class="footer-links">
      <a href="/about.html">About</a> ·
      <a href="/contact.html">Contact</a> ·
      <a href="/privacy.html">Privacy Policy</a> ·
      <a href="https://github.com/aiopentec/careertoolfinder" target="_blank" rel="noopener">View Source on GitHub</a>
    </p>
    <p class="footer-meta">Updated {{ build_date }} · $0/month to operate · Independent comparisons</p>
  </footer>
</body>
</html>
