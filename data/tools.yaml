# Job Tool Stack — tool data
# category values: resume, interview, jobboard, linkedin
# `featured` marks your own product for CTA priority (never used in neutral-sounding copy)
# `affiliate_link` left blank until you have a program approved for that tool

- slug: atskiller
  name: ATSKILLER
  category: resume
  tagline: AI prompt kit for tailoring resumes and cover letters to any job post
  pricing: "$19 one-time"
  pros:
    - Built specifically for ATS keyword matching
    - One-time payment, no subscription
    - Works with any AI chat tool you already use
  cons:
    - Not a standalone app — requires pasting prompts into an AI tool
    - No built-in resume builder/formatter
  url: https://ogoina4.gumroad.com/l/atskiller
  affiliate_link: ""
  featured: true

